<!-- Calendar Game — CHOSEN app icon (2026-06-03; v2: larger + rounded bend at pos 3).
     The swoop is the real day-of-week trace for Pi Day, 3/14/1592 (a Saturday):
     finger positions 2 -> 3 -> 6, landing on 6 = Saturday. (pi = 3.14159...)
     One smooth flowing curve (swoop shape W5); node 3 stays on the right column. Faint dots = rest of the 7-position
     board (0,1,4,5); solid = on-path nodes (2,3); circled dot = the landed answer (6).
     Glyph scaled ~2.2x to fill the home-screen bubble (bigger per the owner, 2026-06-05). This
     larger scale is for the iOS apple-touch / "any" / favicon icons (iOS squircle + full-image uses
     show most of the tile); build-icons.mjs re-renders the MASKABLE variant at a reduced scale so its
     glyph stays inside the 40% maskable safe circle (Android adaptive circle masks). -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="Calendar Game">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#a855f7"/>
      <stop offset=".45" stop-color="#7c3aed"/>
      <stop offset=".78" stop-color="#5b21b6"/>
      <stop offset="1" stop-color="#2e1065"/>
    </linearGradient>
    <radialGradient id="glow" cx=".3" cy=".22" r=".85">
      <stop offset="0" stop-color="#c4b5fd" stop-opacity=".5"/>
      <stop offset=".55" stop-color="#a855f7" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="trace" x1="1" y1="0" x2="0" y2="0">
      <stop offset="0" stop-color="#c4b5fd"/>
      <stop offset="1" stop-color="#ffffff"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="115" ry="115" fill="url(#bg)"/>
  <rect width="512" height="512" rx="115" ry="115" fill="url(#glow)"/>
  <g transform="translate(256 256) scale(2.2) translate(-256 -256)">
    <!-- board dots not on this trace: 0 (center), 1, 4, 5 -->
    <g fill="#ffffff" fill-opacity=".26">
      <circle cx="256" cy="256" r="10"/>
      <circle cx="310" cy="316" r="10"/>
      <circle cx="202" cy="316" r="10"/>
      <circle cx="202" cy="256" r="10"/>
    </g>
    <!-- the trace: 2 -> 3 -> 6, one smooth flowing curve (shape W5) -->
    <path d="M310,256 C313,226 313,206 310,196 C300,184 240,184 202,196"
          fill="none" stroke="url(#trace)" stroke-width="13" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- on-path nodes 2, 3 — both on the right column (x=310), aligned -->
    <g fill="#ffffff">
      <circle cx="310" cy="256" r="10"/>
      <circle cx="310" cy="196" r="10"/>
    </g>
    <!-- landed answer (6 = Saturday), circled -->
    <circle cx="202" cy="196" r="9" fill="#ffffff"/>
    <circle cx="202" cy="196" r="19" fill="none" stroke="#ffffff" stroke-width="5"/>
  </g>
</svg>
