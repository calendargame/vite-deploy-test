# Tells GitHub how to build this app and publish it to GitHub Pages.
name: Deploy to GitHub Pages

# When should the robot run?
on:
  push:
    branches: [main]      # automatically, every time code is pushed to main
  workflow_dispatch:      # and on-demand, via a button in the Actions tab

# What the robot is allowed to do (needed to publish Pages).
permissions:
  contents: read
  pages: write
  id-token: write

# Never run two deploys at once; let the newest push win.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  # Step 1: assemble the finished website.
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the code
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'   # matches the Node version on the laptop
          cache: npm
      - name: Install dependencies
        run: npm ci
      # Quality gate — a failing test, lint error, or TYPE error blocks the deploy, so broken
      # date math / logic can never reach the site. Tests run first (cheapest signal).
      - name: Run tests
        run: npm test
      - name: Lint
        run: npm run lint
      - name: Type-check
        run: npm run typecheck
      - name: Build the site
        run: npm run build
      # Custom domain: the LIVE org repo serves at calendargame.app. A CNAME file in the deployed
      # artifact makes GitHub Pages set + persist that custom domain across every Actions deploy
      # (so it can't silently reset). Only the live repo gets it — the staging repo (test_version)
      # keeps its github.io project URL.
      - name: Add CNAME for the custom domain (live repo only)
        if: github.repository == 'calendargame/calendargame.github.io'
        run: echo 'calendargame.app' > dist/CNAME
      # Size budget — fails the deploy if the app JS bundle grows past the gzip ceiling in
      # scripts/check-bundle-size.mjs, so accidental bloat (e.g. a large library) can't ship
      # unnoticed. Intentional growth = bump the budget constant deliberately (shows in the diff).
      - name: Check bundle size budget
        run: npm run size
      - name: Upload the built site
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist          # the finished files Vite produces

  # Step 2: publish the assembled website to GitHub Pages.
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Publish to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
